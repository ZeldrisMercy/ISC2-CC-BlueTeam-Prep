<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CC (ISC2) Exam Simulator</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="title">
<h1>ISC2 CC Simulator</h1>
<p>Certified in Cybersecurity Practice Exam</p>
</div>

<div class="controls">

<button id="toggleTheme">🌙 Dark / Light</button>

</div>

</header>


<main>

<section id="setupScreen" class="card">

<h2>Start Simulation</h2>

<div class="setup-grid">

<div class="setup-item">

<label>Mode</label>

<select id="modeSelect">
<option value="practice">Practice Mode</option>
<option value="exam">Official Exam Simulation</option>
</select>

</div>

<div class="setup-item">

<label>Timer</label>

<select id="timerSelect">
<option value="off">No Timer</option>
<option value="on">Enable Timer</option>
</select>

</div>

<div class="setup-item">

<label>Shuffle Questions</label>

<input type="checkbox" id="shuffleQuestions" checked>

</div>

<div class="setup-item">

<label>Shuffle Answers</label>

<input type="checkbox" id="shuffleAnswers" checked>

</div>

</div>

<button id="startExamBtn" class="start-btn">
Start Exam
</button>

</section>



<section id="examScreen" class="hidden">

<div class="exam-top">

<div class="progress-wrapper">
<div id="progressBar"></div>
</div>

<div class="exam-stats">

<span id="questionCounter"></span>

<span id="remainingCounter"></span>

<span id="timer"></span>

</div>

</div>


<div id="questionContainer" class="card">

<h2 id="questionText"></h2>

<div id="answersContainer"></div>

</div>


<div class="exam-actions">

<button id="prevBtn">Previous</button>

<button id="markReviewBtn">Mark for Review</button>

<button id="nextBtn">Next</button>

<button id="submitExamBtn" class="submit">Finish Exam</button>

</div>


<div id="questionNav"></div>

</section>



<section id="resultsScreen" class="hidden card">

<h2>Exam Results</h2>

<div id="scoreDisplay"></div>

<div id="domainStats"></div>

<button id="restartBtn">Restart</button>

</section>

</main>



<footer>

<p>ISC2 CC Simulator — Study Tool</p>

</footer>



<!-- JS modules -->

<script src="utils/shuffle.js"></script>
<script src="utils/timer.js"></script>

<script src="data/questions.json" type="application/json" id="questionData"></script>
<script src="data/questionGenerator.js"></script>

<script src="js/examEngine.js"></script>
<script src="js/app.js"></script>
<script src="js/script.js"></script>


</body>

</html>
